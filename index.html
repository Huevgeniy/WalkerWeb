<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WalkerBot — карта маршрутов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map-view" class="view active">
        <div id="map"></div>
        <div class="filter-panel">
            <button class="filter-btn active" data-filter="all"><i class="fas fa-layer-group"></i> Все</button>
            <button class="filter-btn" data-filter="viewpoint"><i class="fas fa-binoculars"></i> Виды</button>
            <button class="filter-btn" data-filter="rock"><i class="fas fa-mountain"></i> Скалы</button>
            <button class="filter-btn" data-filter="water"><i class="fas fa-water"></i> Вода</button>
            <button class="filter-btn" data-filter="forest"><i class="fas fa-tree"></i> Лес</button>
        </div>
        <div class="action-bar" id="main-action-bar">
            <button class="primary-btn" onclick="toggleRouteMode()">
                <i class="fas fa-route"></i> Построить маршрут
            </button>
        </div>
    </div>

    <div id="details-view" class="view bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-content" id="details-content">
            <h2>Выберите точку на карте</h2>
            <p>Нажмите на маркер, чтобы увидеть подробности.</p>
        </div>
    </div>

    <div id="groups-view" class="view">
        <div class="header">
            <h2>🤝 Найти компанию</h2>
            <button class="close-btn" onclick="switchView('map-view')"><i class="fas fa-times"></i></button>
        </div>
        <div class="scroll-container" id="groups-list">
            <p style="text-align:center;color:var(--tg-theme-hint-color)">Загрузка...</p>
        </div>
    </div>

    <div id="profile-view" class="view">
        <div class="header">
            <h2>👤 Мой профиль</h2>
            <button class="close-btn" onclick="switchView('map-view')"><i class="fas fa-times"></i></button>
        </div>
        <div class="scroll-container">
            <div class="profile-card">
                <div class="avatar" id="user-avatar">U</div>
                <h3 id="user-name">Загрузка...</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="value" id="stat-dist">-</span>
                        <span class="label">км</span>
                    </div>
                    <div class="stat-item">
                        <span class="value" id="stat-tracks">-</span>
                        <span class="label">треков</span>
                    </div>
                    <div class="stat-item">
                        <span class="value" id="stat-rank">-</span>
                        <span class="label">ранг</span>
                    </div>
                </div>
            </div>
            <h3>🏆 Достижения</h3>
            <div class="achievements-grid" id="achievements-list">
                <p style="color:var(--tg-theme-hint-color)">Загрузка...</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="switchView('map-view')">
            <i class="fas fa-map"></i>
            <span>Карта</span>
        </button>
        <button class="nav-btn" onclick="loadGroups()">
            <i class="fas fa-users"></i>
            <span>Компания</span>
        </button>
        <button class="nav-btn" onclick="loadProfile()">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </button>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
