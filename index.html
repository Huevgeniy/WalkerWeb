<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="telegram-web-app" content="yes">
    <title>WalkerBot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==================== VIEW: КАРТА ==================== -->
    <div id="view-map" class="view active">
        <div id="map"></div>
        
        <!-- Поиск -->
        <div class="floating-card search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Поиск места...">
        </div>

        <!-- Фильтры POI -->
        <div class="horizontal-scroll filter-bar">
            <button class="chip active" onclick="filterPois('all')">Все</button>
            <button class="chip" onclick="filterPois('столбы')">Столбы</button>
            <button class="chip" onclick="filterPois('торгашинский')">Торгаш</button>
            <button class="chip" onclick="filterPois('гремячая')">Грива</button>
            <button class="chip" onclick="filterPois('центр')">Центр</button>
        </div>

        <!-- Инструменты (Маршрут/Измерение) -->
        <div class="tools-panel">
            <button id="btn-route-mode" class="tool-btn" onclick="toggleRouteMode()">
                <i class="fas fa-route"></i>
            </button>
            <button id="btn-measure-mode" class="tool-btn" onclick="toggleMeasureMode()">
                <i class="fas fa-ruler-combined"></i>
            </button>
        </div>

        <!-- Инфо о маршруте -->
        <div id="route-info" class="floating-card route-info hidden">
            <div><span id="route-dist">0</span> км</div>
            <div style="font-size:12px; opacity:0.8"><span id="route-time">0</span> мин</div>
            <button class="tiny-btn" onclick="finishRouteAction()">OK</button>
        </div>

        <!-- Геолокация -->
        <div class="geo-controls">
            <button class="geo-btn" onclick="centerOnUser()"><i class="fas fa-crosshairs"></i></button>
            <button id="btn-watch" class="geo-btn" onclick="toggleWatch()"><i class="fas fa-location-arrow"></i></button>
        </div>
    </div>

    <!-- ==================== VIEW: МАРШРУТЫ ==================== -->
    <div id="view-routes" class="view">
        <div class="header-title">📍 Мои маршруты</div>
        <div class="scroll-content" id="routes-container">
            <!-- Загружается JS -->
        </div>
    </div>

    <!-- ==================== VIEW: ДРУЗЬЯ ==================== -->
    <div id="view-friends" class="view">
        <div class="header-title">👥 Друзья</div>
        <div class="scroll-content">
            <button class="main-btn" onclick="inviteFriend()"><i class="fas fa-user-plus"></i> Пригласить друга</button>
            <div id="friends-list" style="margin-top:15px"></div>
        </div>
    </div>

    <!-- ==================== VIEW: РЕЙТИНГ ==================== -->
    <div id="view-leaderboard" class="view">
        <div class="header-title">🏆 Топ ходяк</div>
        <div class="scroll-content" id="leaderboard-list"></div>
    </div>

    <!-- ==================== VIEW: ПРОФИЛЬ ==================== -->
    <div id="view-profile" class="view">
        <div class="header-title">👤 Профиль</div>
        <div class="scroll-content">
            <div class="profile-header">
                <div class="avatar-large" id="p-avatar">U</div>
                <h2 id="p-name">Загрузка...</h2>
                <div class="rank-badge" id="p-rank">Новичок</div>
            </div>

            <div class="stats-row">
                <div class="stat-box"><span id="p-km">0</span><small>км</small></div>
                <div class="stat-box"><span id="p-tracks">0</span><small>треков</small></div>
                <div class="stat-box"><span id="p-points">0</span><small>очков</small></div>
            </div>

            <div class="section-title">🎯 Цели на период</div>
            <div id="goals-display" class="goals-container">
                <!-- Сюда рендерятся цели -->
            </div>
            <button class="main-btn" onclick="openGoalsModal()"><i class="fas fa-edit"></i> Редактировать цели</button>
            
            <div class="section-title" style="margin-top:20px">🏅 Достижения</div>
            <div class="achievements-grid" id="achievements-list"></div>
        </div>
    </div>

    <!-- ==================== UI: ШТОРКА ДЕТАЛЕЙ (Только для карты) ==================== -->
    <div id="details-sheet" class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-content" id="sheet-body">
            <!-- Контент места -->
        </div>
    </div>

    <!-- ==================== UI: МОДАЛКА ЦЕЛЕЙ ==================== -->
    <div id="goals-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>Настройка целей</h3>
            
            <label>Период</label>
            <select id="g-period">
                <option value="week">Неделя</option>
                <option value="month">Месяц</option>
            </select>

            <label>Шагов за период</label>
            <input type="number" id="g-steps" placeholder="Например: 50000">

            <label>Километров</label>
            <input type="number" id="g-km" placeholder="Например: 20">

            <label>Количество прогулок</label>
            <input type="number" id="g-walks" placeholder="Например: 4">

            <label>Штраф за невыполнение</label>
            <select id="g-penalty">
                <option value="carry">Перенести долг на след. неделю</option>
                <option value="none">Без штрафа (просто сброс)</option>
            </select>

            <div class="modal-actions">
                <button class="main-btn" onclick="saveGoalsSettings()">Сохранить</button>
                <button class="secondary-btn" onclick="closeGoalsModal()">Отмена</button>
            </div>
        </div>
    </div>

    <!-- ==================== НАВИГАЦИЯ ==================== -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('view-map')"><i class="fas fa-map"></i><span>Карта</span></button>
        <button class="nav-item" onclick="switchTab('view-routes')"><i class="fas fa-route"></i><span>Маршруты</span></button>
        <button class="nav-item" onclick="switchTab('view-friends')"><i class="fas fa-users"></i><span>Друзья</span></button>
        <button class="nav-item" onclick="switchTab('view-leaderboard')"><i class="fas fa-trophy"></i><span>Топ</span></button>
        <button class="nav-item" onclick="switchTab('view-profile')"><i class="fas fa-user"></i><span>Профиль</span></button>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
